<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPulse ERP | Contact Support</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Styling select & textarea to match login styles */
    .form-select-custom {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; font-size: 14px; color: var(--ink);
    }
    .form-select-custom:focus {
      outline: none; border-color: var(--navy); border-width: 1.5px;
    }
  </style>
</head>
<body>

  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>

  <div class="page-wrap">
    <div class="auth-card" style="max-width:1100px;">
      <div class="row g-0">
        <div class="col-md-6 brand-panel" style="min-height:550px;">
          <div class="brand-logo">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>EduPulse ERP</span>
          </div>

          <div>
            <div class="brand-headline">Help Center &<br>Helpdesk Support</div>
            <div class="brand-sub">File a support ticket directly with our IT support staff. We usually respond within 4 hours.</div>
          </div>

          <div class="brand-secure">
            <div class="secure-icon"><i class="fa-solid fa-headset"></i></div>
            <div class="secure-text">ERP INTEGRATED HELPDESK</div>
          </div>
        </div>

        <div class="col-md-6 login-panel" style="padding:40px;">
          <div class="mobile-brand">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>EduPulse ERP</span>
          </div>

          <div class="welcome-title">Submit Support Ticket</div>
          <div class="welcome-sub">Have trouble logging in or notice an issue? Let us know.</div>

          <form id="supportForm" novalidate>
            <div class="row">
              <div class="col-sm-6">
                <label class="field-label" for="supportName">Full Name</label>
                <div class="input-group-custom">
                  <i class="fa-solid fa-user leading-icon"></i>
                  <input type="text" class="form-control-custom" id="supportName" placeholder="Your Name" required>
                </div>
              </div>
              <div class="col-sm-6">
                <label class="field-label" for="supportEmail">Institutional Email</label>
                <div class="input-group-custom">
                  <i class="fa-solid fa-at leading-icon"></i>
                  <input type="email" class="form-control-custom" id="supportEmail" placeholder="name@institution.edu" required>
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-sm-6">
                <label class="field-label" for="supportRole">System Role</label>
                <div class="input-group-custom">
                  <select class="form-select-custom" id="supportRole" required>
                    <option value="" disabled selected>Select Role</option>
                    <option value="Student">Student</option>
                    <option value="Faculty">Faculty</option>
                    <option value="Admin">Admin</option>
                  </select>
                </div>
              </div>
              <div class="col-sm-6">
                <label class="field-label" for="supportSubject">Subject</label>
                <div class="input-group-custom">
                  <i class="fa-solid fa-pen-clip leading-icon"></i>
                  <input type="text" class="form-control-custom" id="supportSubject" placeholder="Brief subject" required>
                </div>
              </div>
            </div>

            <label class="field-label" for="supportDesc">Describe the Issue</label>
            <div class="input-group-custom">
              <textarea class="form-control-custom" id="supportDesc" rows="3" style="padding-left:14px;" placeholder="Provide details like browser, steps to reproduce, or student register number..." required></textarea>
            </div>

            <button type="submit" class="btn-signin" id="submitTicketBtn">
              <span id="btnLabel">Submit Ticket to Helpdesk</span>
              <i class="fa-solid fa-paper-plane" id="btnIcon"></i>
            </button>
          </form>

          <div class="footer-text" style="margin-top:24px;">
            <a href="index.html">Back to Sign In</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="dashboard.js"></script>
<script>
  const form = document.getElementById('supportForm');
    const btn = document.getElementById('submitTicketBtn');
    const btnLabel = document.getElementById('btnLabel');

    // Prepopulate fields if student/faculty email is in URL
    const urlParams = new URLSearchParams(window.location.search);
    const emailParam = urlParams.get('email');
    const roleParam = urlParams.get('role');

    if (emailParam) {
      document.getElementById('supportEmail').value = emailParam;
      const namePart = decodeURIComponent(emailParam).split('@')[0];
      const displayName = namePart.replace(/[._]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      document.getElementById('supportName').value = displayName;
    }

    if (roleParam) {
      const roleSelect = document.getElementById('supportRole');
      const formattedRole = roleParam.charAt(0).toUpperCase() + roleParam.slice(1);
      for (let i = 0; i < roleSelect.options.length; i++) {
        if (roleSelect.options[i].value === formattedRole) {
          roleSelect.selectedIndex = i;
          break;
        }
      }
    }

    // Default Support Tickets
    const defaultTickets = [
      {
        id: "TKT-1024",
        name: "Karthik S",
        email: "karthik.s@institution.edu",
        role: "Student",
        subject: "Grade mismatch on DBMS paper",
        desc: "My internal assessment marks for DBMS are shown as 15/20 instead of 18/20 which was confirmed by the professor. Please check.",
        date: "08 Jul 2026",
        status: "Open"
      },
      {
        id: "TKT-1023",
        name: "Prof. Menon",
        email: "prof.menon@institution.edu",
        role: "Faculty",
        subject: "Need class roster export privileges",
        desc: "Requesting access permissions to export student registers directly in Excel format.",
        date: "07 Jul 2026",
        status: "In Progress"
      }
    ];

    if (!localStorage.getItem('edupulse_support_tickets')) {
      localStorage.setItem('edupulse_support_tickets', JSON.stringify(defaultTickets));
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      btn.disabled = true;
      btnLabel.textContent = 'Filing ticket...';
      const icon = document.getElementById('btnIcon');
      icon.outerHTML = '<span class="spinner-border spinner-border-sm" id="btnIcon" role="status"></span>';

      setTimeout(() => {
        const name = document.getElementById('supportName').value;
        const email = document.getElementById('supportEmail').value;
        const role = document.getElementById('supportRole').value;
        const subject = document.getElementById('supportSubject').value;
        const desc = document.getElementById('supportDesc').value;

        const tickets = JSON.parse(localStorage.getItem('edupulse_support_tickets') || '[]');
        const options = { day: '2-digit', month: 'short', year: 'numeric' };
        const dateStr = new Date().toLocaleDateString('en-GB', options).replace(/,/g, '');

        const newTicket = {
          id: 'TKT-' + Math.floor(1000 + Math.random() * 9000),
          name: name,
          email: email,
          role: role,
          subject: subject,
          desc: desc,
          date: dateStr,
          status: "Open"
        };

        tickets.unshift(newTicket);
        localStorage.setItem('edupulse_support_tickets', JSON.stringify(tickets));

        btn.classList.add('success');
        btnLabel.textContent = 'Ticket Submitted!';
        const spinner = document.getElementById('btnIcon');
        spinner.outerHTML = '<i class="fa-solid fa-circle-check" id="btnIcon"></i>';
        
        // Show success alert
        const alertDiv = document.createElement('div');
        alertDiv.className = 'alert alert-success mt-4';
        alertDiv.style.fontSize = '13.5px';
        alertDiv.innerHTML = `<i class="fa-solid fa-circle-check"></i> Ticket <strong>${newTicket.id}</strong> created successfully. IT Support will reply shortly via email.`;
        form.appendChild(alertDiv);
      }, 1500);
    });
</script>
</body>
</html>
